[dependencies.serde_json]
version = "1.0.140"

[dependencies.regex]
version = "1.10"
optional = true


[dependencies.tokio]
version = "1.52.1"
features = ["full"]

[dependencies.reqwest]
version = "0.12"
features = ["json", "rustls-tls"]
